version: '3.9'

services:

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=true
      - POSTGRES_URL=postgresql+asyncpg://postgres:aci_password@postgres:5432/aci_db
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DB=aci_staging
      - SECRET_KEY=dev-secret-change-in-prod
      - JWT_SECRET=dev-jwt-secret
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    restart: unless-stopped

  # ── Frontend React ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/audio/stream
    depends_on:
      - backend
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aci_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aci_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aci_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=aci_staging

  # ── Mongo Express (Admin UI) ───────────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo

volumes:
  postgres_data:
  mongo_data:
